name: Release

# Sobe um .zip pronto pra usar toda vez que você criar uma tag "vX.Y.Z".
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Compilar o .app universal e empacotar
        run: ./build.sh
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8

      - name: Publicar a Release com o zip
        uses: softprops/action-gh-release@v2
        with:
          files: Insonia.zip
          generate_release_notes: true
